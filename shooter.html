<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Space Shooter</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: monospace; color: #fff; }
  canvas { border: 1px solid #333; display: block; }
  #ui { width: 480px; display: flex; justify-content: space-between; padding: 6px 2px; font-size: 14px; }
  #overlay { position: absolute; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; }
  #overlay h1 { font-size: 36px; color: #0ff; text-shadow: 0 0 20px #0ff; }
  #overlay p  { font-size: 15px; color: #aaa; }
  #overlay .score-display { font-size: 20px; color: #ff0; }
  #start-btn {
    background: #0ff; color: #000; border: none; padding: 10px 28px;
    font-size: 16px; font-family: monospace; cursor: pointer; font-weight: bold;
    border-radius: 3px;
  }
  #start-btn:hover { background: #fff; }
</style>
</head>
<body>
<div id="ui">
  <span>SCORE: <span id="score">0</span></span>
  <span>LEVEL: <span id="level">1</span></span>
  <span>LIVES: <span id="lives">3</span></span>
</div>
<div style="position:relative">
  <canvas id="c" width="480" height="600"></canvas>
  <div id="overlay">
    <h1>SPACE SHOOTER</h1>
    <p>← → to move &nbsp;|&nbsp; SPACE to shoot</p>
    <button id="start-btn">START GAME</button>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

const overlay   = document.getElementById('overlay');
const scoreEl   = document.getElementById('score');
const livesEl   = document.getElementById('lives');
const levelEl   = document.getElementById('level');
const startBtn  = document.getElementById('start-btn');

// ── State ──────────────────────────────────────────────────────────────
let state = 'idle'; // idle | playing | dead | win
let score, lives, level;
let player, bullets, enemies, particles, enemyBullets;
let keys = {};
let shootCooldown = 0;
let enemyShootTimer = 0;
let animId;

// ── Helpers ────────────────────────────────────────────────────────────
const rand = (a, b) => Math.random() * (b - a) + a;
const randInt = (a, b) => Math.floor(rand(a, b + 1));

function spawnParticles(x, y, color, count = 12) {
  for (let i = 0; i < count; i++) {
    const angle = rand(0, Math.PI * 2);
    const speed = rand(1, 4);
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1, decay: rand(0.02, 0.06),
      size: rand(2, 5), color
    });
  }
}

// ── Ship drawing ───────────────────────────────────────────────────────
function drawPlayer(x, y, w, h, invincible) {
  if (invincible && Math.floor(Date.now() / 80) % 2 === 0) return;
  ctx.save();
  ctx.translate(x, y);
  // body
  ctx.fillStyle = '#0af';
  ctx.beginPath();
  ctx.moveTo(0, -h / 2);
  ctx.lineTo(w / 2, h / 2);
  ctx.lineTo(-w / 2, h / 2);
  ctx.closePath();
  ctx.fill();
  // cockpit
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.ellipse(0, -2, 5, 8, 0, 0, Math.PI * 2);
  ctx.fill();
  // thruster flame
  if (keys['ArrowLeft'] || keys['ArrowRight'] || true) {
    ctx.fillStyle = `hsl(${30 + Math.random() * 30},100%,60%)`;
    ctx.beginPath();
    ctx.moveTo(-7, h / 2);
    ctx.lineTo(7, h / 2);
    ctx.lineTo(0, h / 2 + rand(8, 18));
    ctx.closePath();
    ctx.fill();
  }
  ctx.restore();
}

function drawEnemy(e) {
  ctx.save();
  ctx.translate(e.x, e.y);
  ctx.fillStyle = e.color;
  ctx.beginPath();
  ctx.moveTo(0, e.h / 2);
  ctx.lineTo(e.w / 2, -e.h / 2);
  ctx.lineTo(-e.w / 2, -e.h / 2);
  ctx.closePath();
  ctx.fill();
  // eyes
  ctx.fillStyle = '#ff0';
  ctx.beginPath(); ctx.arc(-6, 0, 3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc( 6, 0, 3, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

// ── Enemy grid ─────────────────────────────────────────────────────────
function buildEnemyGrid(lvl) {
  const rows = Math.min(2 + lvl, 5);
  const cols = 8;
  const ew = 40, eh = 32, gx = 12, gy = 14;
  const colors = ['#f44', '#f84', '#ff4', '#4f4', '#4ff'];
  enemies = [];
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      enemies.push({
        x: 50 + c * (ew + gx),
        y: 50 + r * (eh + gy),
        w: ew, h: eh,
        color: colors[r % colors.length],
        hp: 1,
        alive: true,
        baseX: 50 + c * (ew + gx),
        col: c, row: r
      });
    }
  }
}

// ── Init / reset ───────────────────────────────────────────────────────
function initGame() {
  score = 0; lives = 3; level = 1;
  bullets = []; enemyBullets = []; particles = [];
  player = { x: W / 2, y: H - 60, w: 36, h: 36, speed: 5, invincible: 0 };
  buildEnemyGrid(level);
  scoreEl.textContent = 0;
  livesEl.textContent = 3;
  levelEl.textContent = 1;
  shootCooldown = 0;
  enemyShootTimer = 0;
}

// ── Input ──────────────────────────────────────────────────────────────
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space') e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

startBtn.addEventListener('click', () => {
  overlay.style.display = 'none';
  initGame();
  state = 'playing';
  if (animId) cancelAnimationFrame(animId);
  loop();
});

// ── Game loop ──────────────────────────────────────────────────────────
let lastTime = 0;
function loop(ts = 0) {
  const dt = Math.min((ts - lastTime) / 16.67, 3); // normalize to ~60fps
  lastTime = ts;
  update(dt);
  render();
  animId = requestAnimationFrame(loop);
}

// ── Enemy movement ─────────────────────────────────────────────────────
let enemyDir = 1, enemyStep = 0, enemyMoveTimer = 0;
const ENEMY_MOVE_INTERVAL = 40; // frames between moves

function updateEnemies(dt) {
  enemyMoveTimer += dt;
  const alive = enemies.filter(e => e.alive);
  if (alive.length === 0) return;

  const speed = Math.max(4, 40 - alive.length * 0.5);

  if (enemyMoveTimer >= ENEMY_MOVE_INTERVAL / speed) {
    enemyMoveTimer = 0;
    const minX = Math.min(...alive.map(e => e.x - e.w / 2));
    const maxX = Math.max(...alive.map(e => e.x + e.w / 2));

    if ((enemyDir === 1 && maxX >= W - 10) || (enemyDir === -1 && minX <= 10)) {
      enemyDir *= -1;
      enemies.forEach(e => { if (e.alive) e.y += 18; });
    } else {
      enemies.forEach(e => { if (e.alive) e.x += enemyDir * 12; });
    }
  }

  // enemy shoots
  enemyShootTimer += dt;
  const shootInterval = Math.max(30, 90 - level * 8);
  if (enemyShootTimer >= shootInterval) {
    enemyShootTimer = 0;
    const shooters = alive.filter(e =>
      !alive.some(o => o.col === e.col && o.row > e.row)
    );
    if (shooters.length > 0) {
      const s = shooters[randInt(0, shooters.length - 1)];
      enemyBullets.push({ x: s.x, y: s.y + s.h / 2, speed: 4 + level * 0.4 });
    }
  }

  // check if enemies reached bottom
  if (alive.some(e => e.y + e.h / 2 >= H - 60)) {
    triggerDeath();
  }
}

// ── Collision (rect-circle rough) ──────────────────────────────────────
function rectsOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
  return Math.abs(ax - bx) < (aw + bw) / 2 &&
         Math.abs(ay - by) < (ah + bh) / 2;
}

function triggerDeath() {
  if (player.invincible > 0) return;
  lives--;
  livesEl.textContent = lives;
  spawnParticles(player.x, player.y, '#0af', 20);
  if (lives <= 0) {
    state = 'dead';
    showOverlay('GAME OVER', `Final Score: ${score}`, 'PLAY AGAIN');
  } else {
    player.x = W / 2;
    player.invincible = 180;
  }
}

// ── Update ─────────────────────────────────────────────────────────────
function update(dt) {
  if (state !== 'playing') return;

  // player movement
  if (keys['ArrowLeft'])  player.x = Math.max(player.w / 2, player.x - player.speed * dt);
  if (keys['ArrowRight']) player.x = Math.min(W - player.w / 2, player.x + player.speed * dt);

  if (player.invincible > 0) player.invincible -= dt;

  // shooting
  if (shootCooldown > 0) shootCooldown -= dt;
  if (keys['Space'] && shootCooldown <= 0) {
    bullets.push({ x: player.x, y: player.y - player.h / 2, speed: 10 });
    shootCooldown = 12;
  }

  // move player bullets
  bullets = bullets.filter(b => b.y > -10);
  bullets.forEach(b => b.y -= b.speed * dt);

  // move enemy bullets
  enemyBullets = enemyBullets.filter(b => b.y < H + 10);
  enemyBullets.forEach(b => b.y += b.speed * dt);

  // update enemies
  updateEnemies(dt);

  // bullet vs enemy
  bullets = bullets.filter(b => {
    for (let e of enemies) {
      if (!e.alive) continue;
      if (rectsOverlap(b.x, b.y, 4, 12, e.x, e.y, e.w, e.h)) {
        e.alive = false;
        score += 10 * level;
        scoreEl.textContent = score;
        spawnParticles(e.x, e.y, e.color);
        return false;
      }
    }
    return true;
  });

  // enemy bullet vs player
  enemyBullets = enemyBullets.filter(b => {
    if (rectsOverlap(b.x, b.y, 6, 12, player.x, player.y, player.w * 0.7, player.h * 0.7)) {
      triggerDeath();
      return false;
    }
    return true;
  });

  // particles
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.95; p.vy *= 0.95;
    p.life -= p.decay;
  });
  particles = particles.filter(p => p.life > 0);

  // level complete
  if (enemies.every(e => !e.alive)) {
    level++;
    levelEl.textContent = level;
    bullets = []; enemyBullets = [];
    enemyDir = 1; enemyMoveTimer = 0; enemyStep = 0;
    buildEnemyGrid(level);
    player.x = W / 2;
    player.invincible = 60;
  }
}

// ── Render ─────────────────────────────────────────────────────────────
function render() {
  // background
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  // stars
  ctx.fillStyle = '#fff';
  for (let i = 0; i < 80; i++) {
    const sx = ((i * 137 + Date.now() * 0.02) % W + W) % W;
    const sy = ((i * 97  + Date.now() * 0.005 * (1 + i % 3)) % H + H) % H;
    const ss = (i % 3 === 0) ? 1.5 : 1;
    ctx.fillRect(sx, sy, ss, ss);
  }

  // particles
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  // player
  if (state === 'playing') {
    drawPlayer(player.x, player.y, player.w, player.h, player.invincible > 0);
  }

  // enemies
  enemies.forEach(e => { if (e.alive) drawEnemy(e); });

  // player bullets
  ctx.fillStyle = '#0ff';
  bullets.forEach(b => {
    ctx.shadowColor = '#0ff'; ctx.shadowBlur = 8;
    ctx.fillRect(b.x - 2, b.y - 6, 4, 12);
  });

  // enemy bullets
  ctx.fillStyle = '#f44';
  enemyBullets.forEach(b => {
    ctx.shadowColor = '#f44'; ctx.shadowBlur = 8;
    ctx.fillRect(b.x - 3, b.y - 7, 6, 14);
  });
  ctx.shadowBlur = 0;
}

// ── Overlay helper ─────────────────────────────────────────────────────
function showOverlay(title, sub, btnText) {
  overlay.innerHTML = `
    <h1>${title}</h1>
    <p class="score-display">${sub}</p>
    <button id="start-btn">${btnText}</button>
  `;
  overlay.style.display = 'flex';
  document.getElementById('start-btn').addEventListener('click', () => {
    overlay.style.display = 'none';
    initGame();
    state = 'playing';
  });
}
</script>
</body>
</html>
